<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUCK 広告ポータル</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap');
  :root{--bg:#0a0c10;--bg2:#111318;--bg3:#181c24;--border:#2a2f3d;--accent:#e8ff47;--accent2:#47c9ff;--accent3:#ff6b6b;--text:#e8eaf0;--text2:#8891a8;--hp:#ff6b35;--tb:#e8ff47;--gr:#47c9ff;--green:#4ade80;--yellow:#fbbf24;--red:#f87171;--radius:12px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}
  .header{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;}
  .logo{font-family:'Space Mono',monospace;font-weight:700;font-size:17px;color:var(--accent);}
  .logo span{color:var(--text2);font-weight:400;font-size:12px;margin-left:8px;}
  .last-updated{font-size:11px;color:var(--text2);font-family:'Space Mono',monospace;}
  .refresh-btn{background:transparent;border:1px solid var(--border);color:var(--text2);padding:5px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .2s;}
  .refresh-btn:hover{border-color:var(--accent);color:var(--accent);}
  .container{max-width:1200px;margin:0 auto;padding:24px 16px;}
  .tab-nav{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:24px;scrollbar-width:none;}
  .tab-nav::-webkit-scrollbar{display:none;}
  .tab-btn{flex-shrink:0;padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .2s;white-space:nowrap;}
  .tab-btn.active{background:var(--accent);color:#0a0c10;border-color:var(--accent);font-weight:700;}
  .tab-btn:hover:not(.active){border-color:var(--accent);color:var(--accent);}
  .tab-content{display:none;}.tab-content.active{display:block;}
  .section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
  .section-title::before{content:'';width:3px;height:14px;background:var(--accent);border-radius:2px;}
  .overview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:32px;}
  .store-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;border-top:3px solid transparent;}
  .store-card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.5);}
  .store-name{font-weight:700;font-size:15px;margin-bottom:3px;}
  .store-area{font-size:11px;color:var(--text2);margin-bottom:14px;}
  .store-metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .metric{background:var(--bg3);border-radius:8px;padding:9px 12px;}
  .metric-label{font-size:10px;color:var(--text2);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px;}
  .metric-value{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;}
  .good{color:var(--green);}.warn{color:var(--yellow);}.bad{color:var(--red);}
  .tabelog-score{display:flex;align-items:center;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
  .score-badge{background:var(--bg3);border-radius:6px;padding:3px 10px;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;}
  .score-label{font-size:11px;color:var(--text2);}
  .tabelog-link{color:var(--accent2);text-decoration:none;font-size:11px;border:1px solid var(--accent2);padding:2px 8px;border-radius:4px;margin-left:auto;transition:all .2s;}
  .tabelog-link:hover{background:var(--accent2);color:#0a0c10;}
  .status-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500;}
  .status-badge.ok{background:rgba(74,222,128,.1);color:var(--green);}
  .status-badge.demo{background:rgba(251,191,36,.1);color:var(--yellow);}
  .chart-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;margin-bottom:24px;}
  .chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;}
  .chart-title{font-size:12px;color:var(--text2);margin-bottom:14px;font-weight:500;}
  .chart-wrap{position:relative;height:200px;}
  .chart-wrap-lg{position:relative;height:260px;}
  .media-table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:24px;}
  .tbl{width:100%;border-collapse:collapse;font-size:13px;}
  .tbl th{background:var(--bg3);padding:10px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);font-weight:700;border-bottom:1px solid var(--border);}
  .tbl td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
  .tbl tr:last-child td{border-bottom:none;}
  .tbl tr:hover td{background:var(--bg3);}
  .media-tag{display:inline-flex;align-items:center;gap:6px;font-weight:600;font-size:12px;}
  .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .num{font-family:'Space Mono',monospace;font-size:12px;}
  .kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:24px;}
  .kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
  .kpi-label{font-size:10px;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
  .kpi-value{font-family:'Space Mono',monospace;font-size:19px;font-weight:700;color:var(--accent);}
  .kpi-sub{font-size:10px;color:var(--text2);margin-top:3px;}
  .back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--text2);font-size:13px;cursor:pointer;margin-bottom:20px;padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;font-family:'Noto Sans JP',sans-serif;transition:all .2s;}
  .back-btn:hover{color:var(--accent);border-color:var(--accent);}
  .store-header{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:24px;}
  .store-header-title{font-size:22px;font-weight:700;margin-bottom:4px;}
  .store-header-sub{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .monthly-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow-x:auto;margin-bottom:24px;}
  .monthly-tbl{width:100%;border-collapse:collapse;font-size:12px;min-width:700px;}
  .monthly-tbl th{background:var(--bg3);padding:9px 12px;text-align:center;font-size:10px;color:var(--text2);font-weight:700;border-bottom:1px solid var(--border);white-space:nowrap;}
  .monthly-tbl th:first-child{text-align:left;}
  .monthly-tbl td{padding:8px 12px;text-align:center;border-bottom:1px solid var(--border);font-family:'Space Mono',monospace;font-size:11px;white-space:nowrap;}
  .monthly-tbl td:first-child{text-align:left;font-family:'Noto Sans JP',sans-serif;font-size:11px;color:var(--text2);}
  .monthly-tbl tr:last-child td{border-bottom:none;}
  .monthly-tbl .sec-row td{background:var(--bg3);color:var(--text2);font-size:10px;padding:5px 12px;}
  .monthly-tbl .tot-row td{color:var(--accent);font-weight:700;}
  .monthly-tbl .sub-row td{color:var(--text);}
  /* 損益P&L専用 */
  .pl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:24px;}
  .pl-store-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden;}
  .pl-store-name{font-weight:700;font-size:13px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
  .pl-rows{display:flex;flex-direction:column;gap:6px;}
  .pl-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;}
  .pl-row-label{color:var(--text2);}
  .pl-row-value{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;}
  .pl-divider{height:1px;background:var(--border);margin:8px 0;}
  .pl-profit-row{display:flex;justify-content:space-between;align-items:center;background:var(--bg3);border-radius:6px;padding:8px 10px;margin-top:8px;}
  .pl-profit-label{font-size:12px;font-weight:700;}
  .pl-profit-value{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-msg{text-align:center;padding:48px 20px;color:var(--text2);font-size:14px;}
  .demo-notice{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.3);border-radius:8px;padding:10px 16px;color:var(--yellow);font-size:12px;margin-bottom:20px;}
  @media(max-width:600px){
    .header{padding:10px 14px;}.logo span{display:none;}
    .container{padding:14px 10px;}.kpi-row{grid-template-columns:1fr 1fr;}
    .overview-grid,.pl-grid{grid-template-columns:1fr;}.store-header-title{font-size:18px;}
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">LUCK<span>広告ポータル</span></div>
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="last-updated" id="lastUpdated">—</div>
    <button class="refresh-btn" onclick="loadAllData()">↻ 更新</button>
  </div>
</div>

<div class="container">

  <div class="tab-nav" id="tabNav">
    <button class="tab-btn active" onclick="switchTab('overview',this)">📊 全店舗概要</button>
    <button class="tab-btn" onclick="switchTab('compare',this)">🔍 媒体比較</button>
    <button class="tab-btn" onclick="switchTab('pl',this)">💰 損益一覧</button>
    <button class="tab-btn" onclick="switchTab('detail',this)" id="detailTabBtn" style="display:none;">📋 店舗詳細</button>
  </div>

  <!-- ===== 全店舗概要 ===== -->
  <div class="tab-content active" id="tab-overview">
    <div class="demo-notice" id="demoNotice">⚠ デモモード：GAS URLを設定するまでサンプルデータで表示しています</div>
    <div class="section-title">6店舗 広告KPIサマリー</div>
    <div class="overview-grid" id="overviewGrid">
      <div class="loading-msg" style="grid-column:1/-1"><span class="spinner"></span>読み込み中...</div>
    </div>
    <div class="section-title">全店舗 月次売上推移</div>
    <div class="chart-card" style="margin-bottom:24px;">
      <div class="chart-title">月別売上（6店舗合計）</div>
      <div class="chart-wrap-lg"><canvas id="chartAllSales"></canvas></div>
    </div>
    <div class="chart-grid">
      <div class="chart-card">
        <div class="chart-title">媒体別 広告費（6店舗合計）</div>
        <div class="chart-wrap"><canvas id="chartAdCost"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">媒体別 集客人数（6店舗合計）</div>
        <div class="chart-wrap"><canvas id="chartGuest"></canvas></div>
      </div>
    </div>
  </div>

  <!-- ===== 媒体比較 ===== -->
  <div class="tab-content" id="tab-compare">
    <div class="section-title">媒体別 費用対効果（累計）</div>
    <div class="media-table-wrap">
      <table class="tbl">
        <thead>
          <tr>
            <th>店舗</th><th>媒体</th><th>累計広告費</th><th>累計集客</th><th>CPC/1人</th><th>評価</th>
          </tr>
        </thead>
        <tbody id="mediaBody">
          <tr><td colspan="6" style="text-align:center;padding:28px;color:var(--text2);"><span class="spinner"></span>読み込み中...</td></tr>
        </tbody>
      </table>
    </div>
    <div class="section-title">CPC/1人 比較（店舗×媒体）</div>
    <div class="chart-card" style="margin-bottom:24px;">
      <div class="chart-wrap-lg"><canvas id="chartCpc"></canvas></div>
    </div>
  </div>

  <!-- ===== 損益一覧 ===== -->
  <div class="tab-content" id="tab-pl">
    <div class="section-title">6店舗 損益サマリー（累計）</div>
    <div class="pl-grid" id="plGrid">
      <div class="loading-msg" style="grid-column:1/-1"><span class="spinner"></span>読み込み中...</div>
    </div>
    <div class="section-title">営業利益 月次推移（6店舗）</div>
    <div class="chart-card" style="margin-bottom:24px;">
      <div class="chart-title">営業利益（月別）</div>
      <div class="chart-wrap-lg"><canvas id="chartOpProfit"></canvas></div>
    </div>
    <div class="chart-grid">
      <div class="chart-card">
        <div class="chart-title">売上vs粗利（累計比較）</div>
        <div class="chart-wrap"><canvas id="chartGrossCompare"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">費用内訳（6店舗平均構成）</div>
        <div class="chart-wrap"><canvas id="chartCostBreakdown"></canvas></div>
      </div>
    </div>
    <div class="section-title">損益 月次詳細</div>
    <div style="margin-bottom:12px;">
      <select id="plStoreSelect" onchange="renderPLDetail()" style="background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:6px;font-size:13px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;">
        <option value="">店舗を選択してください</option>
      </select>
    </div>
    <div id="plDetailTable"></div>
  </div>

  <!-- ===== 店舗詳細 ===== -->
  <div class="tab-content" id="tab-detail">
    <button class="back-btn" onclick="backToOverview()">← 一覧に戻る</button>
    <div id="storeDetailContent"><div class="loading-msg"><span class="spinner"></span>読み込み中...</div></div>
  </div>

</div>

<script>
// ============================================================
// ★ 設定：GASデプロイ後にURLを入力してください
// ============================================================
const STORES = [
  { id:'niiyama',         name:'おばんざい酒場 にいやま', area:'北浜',  genre:'居酒屋',       score:3.19, reviews:48,  tabelogUrl:'https://tabelog.com/osaka/A2701/A270102/27114120/', color:'#e8ff47', adGasUrl:'https://script.google.com/macros/s/AKfycbxfrNMarxRmz1vLFz0DIiQXUBQRARvQX3KmX49s9WZdOY59YKn4muU1RUKOCxFBiY0v/exec', plGasUrl:'' },
  { id:'shichifuku_awa',  name:'炭焼和牛 七福',           area:'阿波座',genre:'焼肉',          score:3.17, reviews:32,  tabelogUrl:'https://tabelog.com/osaka/A2701/A270105/27051372/', color:'#ff6b35', adGasUrl:'https://script.google.com/macros/s/AKfycbwSpGkWaNhVfuHeCvg1sX8xqUMnt6WBru6BjL5Djp0H_sZGx3L08kQFn92Pupb1Wq3BmQ/exec', plGasUrl:'' },
  { id:'hwajaya',         name:'韓国料理居酒屋 ふぁじゃ家', area:'本町', genre:'韓国料理',      score:3.26, reviews:41,  tabelogUrl:'https://tabelog.com/osaka/A2701/A270106/27131003/', color:'#ff47a0', adGasUrl:'https://script.google.com/macros/s/AKfycbybpTPF6X-BlKM-UJrdLoNhVEHzmQSChRoXYS1JmWY-6JtlMzlEBMgCkPrBMuEiXzET/exec', plGasUrl:'' },
  { id:'hormon',          name:'七福 通天閣店',           area:'新世界',genre:'串揚げ・焼肉',   score:3.28, reviews:57,  tabelogUrl:'https://tabelog.com/osaka/A2701/A270206/27062559/', color:'#47c9ff', adGasUrl:'https://script.google.com/macros/s/AKfycbx8MfKiicaPsLtdktK26zrjp5bpJZDL1T94EqjbssjWSyo5wc3qTi7Ngfa7vrJErZY4/exec', plGasUrl:'' },
  { id:'kushikatsu',      name:'なにわの串カツ 七福',     area:'新世界',genre:'串カツ・鍋',     score:3.09, reviews:29,  tabelogUrl:'https://tabelog.com/osaka/A2701/A270206/27102638/', color:'#a78bfa', adGasUrl:'https://script.google.com/macros/s/AKfycbxY0Bgh7S20a8bzenzZHiqrWauURVaJqCxHtk0_QXIVGiqFk0P5qq4KWSRuQkVb4b6NKw/exec', plGasUrl:'' },
  { id:'konamono',        name:'なにわの粉もん 七福',     area:'新世界',genre:'たこ焼き・粉もん',score:3.05, reviews:5,   tabelogUrl:'https://tabelog.com/osaka/A2701/A270206/27146974/', color:'#34d399', adGasUrl:'https://script.google.com/macros/s/AKfycbzU5QA2hb-XfbyvAcq9NzSwumhJsBtR-ox7HVR5CCjLRWb9U88ZseJqIrqZbaE5fkFmXA/exec', plGasUrl:'' },
];

// ④⑤合算損益GAS URL（経費合算のため）
const COMBINED_PL_GAS_URL = '';

const adCache = {}, plCache = {};
let charts = {}, currentStore = null;

// ============================================================
// データ取得
// ============================================================
async function loadAllData() {
  document.getElementById('lastUpdated').textContent = '更新中...';
  await Promise.all([
    ...STORES.map(s => fetchAd(s)),
    ...STORES.map(s => fetchPL(s)),
  ]);
  renderOverview();
  renderMediaCompare();
  renderPLOverview();
  initPLSelect();
  const t = new Date();
  document.getElementById('lastUpdated').textContent = `${t.getHours()}:${String(t.getMinutes()).padStart(2,'0')} 更新`;
  const allDemo = STORES.every(s => !s.adGasUrl && !s.plGasUrl);
  document.getElementById('demoNotice').style.display = allDemo ? 'block' : 'none';
}

async function fetchAd(store) {
  if (!store.adGasUrl) { adCache[store.id] = mockAd(store); return; }
  try {
    const d = await (await fetch(store.adGasUrl)).json();
    if (!d.summary.totalSalesSum) d.summary.totalSalesSum = (d.summary.totalSales||[]).reduce((a,b)=>a+b,0);
    if (!d.summary.totalAdCostSum) d.summary.totalAdCostSum = (d.summary.totalAdCost||[]).reduce((a,b)=>a+b,0);
    if (!d.summary.totalGuestSum) d.summary.totalGuestSum = (d.summary.totalGuest||[]).reduce((a,b)=>a+b,0);
    ["hotpepper","tabelog","gurunavi"].forEach(k=>{
      if (!d[k].guestSum) d[k].guestSum=(d[k].guest||[]).reduce((a,b)=>a+b,0);
      if (!d[k].actualSum) d[k].actualSum=(d[k].actual||[]).reduce((a,b)=>a+b,0);
    });
    adCache[store.id] = d;
  } catch(e) { adCache[store.id] = mockAd(store); }
}
async function fetchPL(store) {
  if (!store.plGasUrl) { plCache[store.id] = mockPL(store); return; }
  try { plCache[store.id] = await (await fetch(store.plGasUrl)).json(); }
  catch(e) { plCache[store.id] = mockPL(store); }
}

// ============================================================
// モックデータ
// ============================================================
function mockAd(s) {
  const months = ['6月','7月','8月','9月','10月','11月','12月','1月'];
  const base = [4500000,4200000,3800000,4100000,4600000,3900000,5200000,3700000].map(v=>Math.round(v*(0.8+Math.random()*.4)));
  const hp   = months.map(()=>Math.round(90+Math.random()*60));
  const tb   = months.map(()=>Math.round(100+Math.random()*80));
  const gr   = months.map(()=>Math.round(40+Math.random()*40));
  return {
    months,
    summary:{totalSales:base,totalAdCost:base.map(v=>Math.round(v*.045)),adRatio:base.map(v=>4.5),totalGuestSum:hp.reduce((a,b)=>a+b,0)+tb.reduce((a,b)=>a+b,0)+gr.reduce((a,b)=>a+b,0),totalSalesSum:base.reduce((a,b)=>a+b,0),totalAdCostSum:Math.round(base.reduce((a,b)=>a+b,0)*.045)},
    hotpepper:{guest:hp,actual:hp.map(v=>Math.round(v*1200)),cpcPerson:hp.map(()=>Math.round(1100+Math.random()*700)),guestSum:hp.reduce((a,b)=>a+b,0),actualSum:hp.reduce((a,b)=>a+b,0)*1200},
    tabelog:  {guest:tb,actual:tb.map(v=>Math.round(v*350)), cpcPerson:tb.map(()=>Math.round(300+Math.random()*350)), guestSum:tb.reduce((a,b)=>a+b,0),actualSum:tb.reduce((a,b)=>a+b,0)*350},
    gurunavi: {guest:gr,actual:gr.map(v=>Math.round(v*900)), cpcPerson:gr.map(()=>Math.round(700+Math.random()*600)), guestSum:gr.reduce((a,b)=>a+b,0),actualSum:gr.reduce((a,b)=>a+b,0)*900},
  };
}
function mockPL(s) {
  const months = ['6月','7月','8月','9月','10月','11月','12月','1月'];
  const sales = months.map(()=>Math.round((4000000+Math.random()*1500000)));
  const cost  = sales.map(v=>Math.round(v*.28));
  const gross = sales.map((v,i)=>v-cost[i]);
  const labor = sales.map(v=>Math.round(v*.32));
  const rent  = sales.map(()=>500000);
  const util  = sales.map(v=>Math.round(v*.06));
  const ad    = sales.map(v=>Math.round(v*.045));
  const sga   = sales.map((v,i)=>labor[i]+rent[i]+util[i]+ad[i]+Math.round(v*.04));
  const op    = gross.map((v,i)=>v-sga[i]);
  const sum   = arr=>arr.reduce((a,b)=>a+b,0);
  return {months,prevSales:sales.map(v=>Math.round(v*.9)),sales,yoyRatio:sales.map(()=>110),cost,gross,labor,rent,utility:util,ad,sga,opProfit:op,salesSum:sum(sales),grossSum:sum(gross),sgaSum:sum(sga),opProfitSum:sum(op),laborSum:sum(labor),rentSum:sum(rent),adSum:sum(ad),detail:{labor,legalCost:labor.map(v=>Math.round(v*.15)),rent,utility:util,comms:months.map(()=>15000),bank:months.map(()=>25000),ad,supplies:months.map(()=>Math.round(30000+Math.random()*20000)),misc:months.map(()=>Math.round(10000+Math.random()*15000)),insurance:months.map(()=>20000),entertain:months.map(()=>Math.round(5000+Math.random()*10000)),depreciate:months.map(()=>50000)}};
}

function renderMediaCompare() {
  const tbody = document.getElementById('mediaBody');

  STORES.forEach(s=>{
    const d=adCache[s.id];if(!d)return;
    const medias=[
      {key:'hotpepper',name:'ホットペッパー',dot:'#ff6b35',cls:'hp'},
      {key:'tabelog',  name:'食べログ',      dot:'#e8ff47',cls:'tb'},
      {key:'gurunavi', name:'ぐるなび',      dot:'#47c9ff',cls:'gr'},
    ];
    medias.forEach((m,i)=>{
      const aSum=d[m.key]?.actualSum||0;

        <td><span class="media-tag"><span class="dot" style="background:${m.dot}"></span>${m.name}</span></td>

        <td><span class="${ec}" style="font-size:12px;font-weight:700;">${el}</span></td>

// ============================================================
// ユーティリティ
// ============================================================
function switchTab(id,btn){
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  if(btn) btn.classList.add('active');
}
function dc(id){const c=document.getElementById(id);if(c){const ex=Chart.getChart(c);if(ex)ex.destroy();}}
function fmtM(v){if(!v)return'0';if(v>=1000000)return(v/1000000).toFixed(1)+'M';if(v>=1000)return Math.round(v/1000)+'K';return v.toLocaleString();}
function fmtK(v){if(!v&&v!==0)return'0';if(Math.abs(v)>=1000000)return(v/1000000).toFixed(1)+'M';if(Math.abs(v)>=1000)return Math.round(v/1000)+'K';return v.toLocaleString();}
function dAxis(){return{grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#8891a8',font:{size:10}}};}
function cOpts(unit){return{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8891a8',font:{size:11},boxWidth:12}},tooltip:{backgroundColor:'#181c24',titleColor:'#e8eaf0',bodyColor:'#8891a8',borderColor:'#2a2f3d',borderWidth:1,callbacks:{label:ctx=>` ${ctx.dataset.label}: ${unit==='¥'?'¥':''}${ctx.parsed.y?.toLocaleString()||0}${unit!=='¥'?unit:''}`}}},scales:{x:dAxis(),y:dAxis()}};}

loadAllData();
